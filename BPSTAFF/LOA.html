<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOA Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #02030a;
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  width: 100%;
  max-width: 500px;
  background: #0a0c1a;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #ff4d4d;
}

/* Warning */
.warning {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff1a1a;
  color: #ff4d4d;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #05070f;
  border: 1px solid #3a1a1a;
  border-radius: 8px;
  color: #fff;
  outline: none;
  transition: 0.2s;
}

input:focus, textarea:focus {
  border-color: #ff4d4d;
  box-shadow: 0 0 8px rgba(255,77,77,0.4);
}

/* Button */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #990000, #ff1a1a);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
}

/* Cookie banner */
#cookie-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0c1a;
  padding: 15px 20px;
  border-radius: 10px;
  border: 1px solid #3a1a1a;
  display: flex;
  gap: 15px;
  align-items: center;
  max-width: 600px;
}

.cookie-btn {
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.accept {
  background: #ff1a1a;
  color: #fff;
}

.decline {
  background: #2a0f0f;
  color: #fff;
}

a {
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">
  <h2>LOA Request</h2>

  <div class="warning">
    ⚠️ STAFF ONLY: If you are not an authorised staff member, do NOT access this page.
    If you have gained access unintentionally, report a password leak immediately.
  </div>

  <form id="loaForm">
    <input type="text" id="user" placeholder="Username" required>
    <input type="text" id="rank" placeholder="Rank" required>
    <input type="text" id="reason" placeholder="Reason" required>
    <input type="text" id="start" placeholder="Start Date" required>
    <input type="text" id="end" placeholder="End Date" required>
    <textarea id="info" placeholder="Other Info"></textarea>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
document.getElementById("loaForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const webhookURL = "https://discord.com/api/webhooks/1498012449776079040/qIgZ5zDiujr0-NC-6MWOz7wXnbg-NYj5JHsfJvwVY7tHd5Nm1vhWbXXSWRg-dA7_ufnO";

  // Time
  const now = new Date();
  const formattedTime = now.toLocaleString("en-GB", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  // IP
  let ip = "Unknown";
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const ipData = await res.json();
    ip = ipData.ip;
  } catch (err) {
    ip = "Failed to fetch";
  }

  const data = {
    content: "<@&1122570216673656973>",
    embeds: [{
      title: "New LOA Request",
      color: 16711680,
      fields: [
        { name: "User", value: document.getElementById("user").value, inline: true },
        { name: "Rank", value: document.getElementById("rank").value, inline: true },
        { name: "Reason", value: document.getElementById("reason").value },
        { name: "Start Date", value: document.getElementById("start").value, inline: true },
        { name: "End Date", value: document.getElementById("end").value, inline: true },
        { name: "Other Info", value: document.getElementById("info").value || "N/A" },
        { name: "Submitted At", value: formattedTime },
        { name: "IP Address", value: ip }
      ]
    }]
  };

  fetch(webhookURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Submitted!");
});
</script>

<!-- Password -->
<script>
let pass = prompt("Enter admin password:");
if (pass !== "Samson1322") {
  document.body.innerHTML = "Access Denied";
}
</script>

<!-- Cookie banner -->
<div id="cookie-banner">
  <span>
    We use analytics cookies to improve the site.
    <a href="/privacy/">Privacy Policy</a>
  </span>

  <button class="cookie-btn accept" onclick="acceptCookies()">Accept</button>
  <button class="cookie-btn decline" onclick="declineCookies()">Decline</button>
</div>

<script src="/js/cookies.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
