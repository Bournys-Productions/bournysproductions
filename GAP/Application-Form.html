<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOA Form</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/BP-LOGO.png">
<link rel="shortcut icon" href="/images/BP-LOGO.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #02030a;
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: #0a0c1a;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
  color: #ff4d4d;
}

.warning {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff1a1a;
  color: #ff4d4d;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 13px;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #05070f;
  border: 1px solid #3a1a1a;
  border-radius: 8px;
  color: #fff;
  outline: none;
  font-size: 16px;
}

input:focus, textarea:focus {
  border-color: #ff4d4d;
  box-shadow: 0 0 8px rgba(255,77,77,0.4);
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #990000, #ff1a1a);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
}

@media (max-width: 600px) {
  .container {
    padding: 18px;
  }

  h2 {
    font-size: 20px;
  }

  button {
    padding: 12px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>LOA Request</h2>

  <div class="warning">
    ⚠️ STAFF ONLY: Unauthorised access is forbidden. Report password leaks immediately.
  </div>

  <form id="loaForm">
    <input type="text" id="Roblox Username" placeholder="Roblox Username" required>
    <input type="text" id="Discord Username" placeholder="Discord Username" required>
    <input type="text" id="Game / Project Name" placeholder="Game / Project Name" required>
    <input type="text" id="Overall Goals" placeholder="Overall Goals" required>
    <input type="text" id="Services Wanting" placeholder="Services Wanting" required>
    <textarea id="info" placeholder="Other Info (More the better)"></textarea>

    <button type="submit">Submit LOA</button>
  </form>
</div>

<script>
document.getElementById("loaForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const webhookURL = "https://discord.com/api/webhooks/1499159413775138828/ysd1iZ2qRejJpPDOs9GeX_vb6nvKhyhcEKiau8L9VOKZsADI6QGiI-RlNjn3AohNTh1X";

  const now = new Date();
  const formattedTime = now.toLocaleString("en-GB", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  let ip = "Unknown";
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const dataIP = await res.json();
    ip = dataIP.ip;
  } catch {
    ip = "Failed to fetch";
  }

  const data = {
    content: "<@1122570216673656973>",
    embeds: [{
      title: "GAP Application",
      color: 16711680,
      fields: [
        { name: "Discord User", value: document.getElementById("user").value, inline: true },
        { name: "Roblox User", value: document.getElementById("rank").value, inline: true },
        { name: "Game / Project Name", value: document.getElementById("reason").value },
        { name: "Overall Goals", value: document.getElementById("start").value, inline: true },
        { name: "Services Wanting", value: document.getElementById("end").value, inline: true },
        { name: "Other Info", value: document.getElementById("info").value || "N/A" },
        { name: "Submitted At", value: formattedTime },
        { name: "IP Address", value: ip }
      ]
    }]
  };

  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("Form submitted successfully.");
});
</script>

</body>
</html>
