<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAP Application Form</title>

<link rel="icon" type="image/png" sizes="32x32" href="/images/BP-LOGO.png">
<link rel="shortcut icon" href="/images/BP-LOGO.png">
  
</head>

<div class="container">
  <h2>GAP Request</h2>

  <div class="warning">
    Please fill out one form per project. Information submitted will not be shared.
  </div>

  <form id="loaForm">
    <input type="text" id="roblox" placeholder="Roblox Username" required>
    <input type="text" id="discord" placeholder="Discord Username" required>
    <input type="text" id="email" placeholder="Email Address" required>
    <input type="text" id="project" placeholder="Game / Project Name" required>
    <input type="text" id="goals" placeholder="Overall Goals" required>
    <input type="text" id="services" placeholder="Services Wanting" required>
    <input type="text" id="funding" placeholder="Amount available for project funding" required>
    <textarea id="info" placeholder="Other Info (More the better)"></textarea>

    <button type="submit">Submit Form</button>
  </form>
</div>

<script>
document.getElementById("loaForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const webhookURL = "https://discord.com/api/webhooks/1499159413775138828/ysd1iZ2qRejJpPDOs9GeX_vb6nvKhyhcEKiau8L9VOKZsADI6QGiI-RlNjn3AohNTh1X";

  const now = new Date();
  const formattedTime = now.toLocaleString("en-GB", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  let ip = "Unknown";

  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    ip = data.ip;
  } catch {
    ip = "Failed to fetch";
  }

  const data = {
    content: "<@1122570216673656973>",
    embeds: [{
      title: "GAP Application",
      color: 16711680,
      fields: [
        { name: "Roblox Username", value: document.getElementById("roblox").value, inline: true },
        { name: "Discord Username", value: document.getElementById("discord").value, inline: true },
        { name: "Email Address", value: document.getElementById("email").value, inline: true },
        { name: "Game / Project Name", value: document.getElementById("project").value },
        { name: "Overall Goals", value: document.getElementById("goals").value, inline: true },
        { name: "Services Wanting", value: document.getElementById("services").value, inline: true },
        { name: "Ammount of funding", value: document.getElementById("funding").value, inline: true },
        { name: "Other Info", value: document.getElementById("info").value || "N/A" },
        { name: "Submitted At", value: formattedTime },
        { name: "IP Address", value: ip }
      ]
    }]
  };

  const response = await fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  if (response.ok) {
    alert("Form submitted successfully.");
    document.getElementById("loaForm").reset();
  } else {
    alert("Failed to submit form. Check webhook.");
    console.log(await response.text());
  }
});
</script>

</body>
</html>
