<!DOCTYPE html>
<html>
<head>
  <title>Your Cable Shop</title>
  <style>
    /* Super simple styling — change colors/fonts to fit your site */
    body { font-family: Arial; max-width: 1000px; margin: 0 auto; padding: 20px; }
    .product { border: 1px solid #eee; padding: 20px; margin: 10px; width: 300px; display: inline-block; }
    button { background: #008cba; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    button:hover { background: #006b87; }
  </style>
</head>
<body>
  <h1>Our Cables</h1>

  <!-- Product 1 -->
  <div class="product">
    <h3>1m Cat6 Ethernet Cable</h3>
    <p>High-speed gigabit cable, perfect for gaming/streaming</p>
    <p>£1.99</p>
    <button onclick="addToCart('1m Cat6 Cable', 1.99)">Add to Cart</button>
  </div>

  <!-- Product 2 -->
  <div class="product">
    <h3>5m Cat6 Ethernet Cable</h3>
    <p>Long, durable cable for home offices</p>
    <p>£4.99</p>
    <button onclick="addToCart('5m Cat6 Cable', 4.99)">Add to Cart</button>
  </div>

  <!-- Link to cart (in case they want to check it without adding) -->
  <p><a href="cart.html">View Cart</a></p>

  <!-- Cart logic script -->
  <script>
    function addToCart(name, price) {
      // Save items in the browser so they don't disappear
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name: name, price: price });
      localStorage.setItem('cart', JSON.stringify(cart));
      
      // Jump to cart page right away
      window.location.href = 'cart.html';
    }
  </script>
</body>
</html>
