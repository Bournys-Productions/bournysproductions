<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bournys Productions</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="topbar">
    <button class="menu-btn" id="menuToggle" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <h1 class="topbar-title">BOURNYS PRODUCTIONS</h1>
  </header>

  <style>
    /* ONLY affects this page */

    .page {
      position: relative;
      z-index: 1;
    }

    .hero-simple {
      text-align: center;
      padding: 120px 20px 40px;
    }

    .hero-simple h2 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    .hero-simple p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.75);
      max-width: 700px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title h3 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 800;
      color: #fff;
      position: relative;
      display: inline-block;
      margin: 0;
    }

    .section-title h3::after {
      content: "";
      display: block;
      width: 90px;
      height: 4px;
      margin: 14px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #ff2a2a, transparent);
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
    }

    .product-grid {
      display: flex;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 28px;
      padding: 0 20px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .product-card {
      width: 320px;
      min-height: 220px;
      border-radius: 22px;
      background: rgba(18, 18, 30, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow:
        0 16px 35px rgba(0, 0, 0, 0.45),
        0 0 20px rgba(255, 0, 0, 0.12);
    }

    .product-content {
      padding: 30px 24px;
      width: 100%;
    }

    .product-content h4 {
      font-size: 1.8rem;
      color: #fff;
      margin: 0 0 12px;
      font-weight: 800;
    }

    .product-content p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.72);
      margin: 0 0 24px;
      line-height: 1.5;
    }

    .view-btn {
      display: inline-block;
      padding: 12px 26px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: #ff2b2b;
      border-radius: 12px;
      box-shadow: 0 0 14px rgba(255, 0, 0, 0.25);
      transition: all 0.25s ease;
    }

    .view-btn:hover {
      transform: translateY(-2px);
      background: #ff3b3b;
      box-shadow: 0 0 18px rgba(255, 0, 0, 0.45);
    }

    @media (max-width: 768px) {
      .hero-simple {
        padding: 100px 16px 30px;
      }

      .back-wrap {
        margin: 15px 0 50px;
      }

      .product-grid {
        padding: 0 16px 60px;
        gap: 20px;
      }

      .product-card {
        width: 100%;
        max-width: 340px;
        min-height: 200px;
      }

      .product-content h4 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
  
  <nav class="sidebar" id="sidebar">
    <a href="/">Home</a>
    <a href="/police-vehicles/">Police Vehicles</a>
    <a href="/sba-bb/">Products</a>
    <a href="/contact-us/">Contact Us</a>
    <a href="/login/">Login</a>
  </nav>

  <main class="page">
    <section class="hero-simple">
      <h2>Bournys Productions</h2>
    </section>

    <section class="section-title">
      <h3>Featured Projects</h3>
    </section>

    <section class="product-grid">
      <div class="product-card">
        <div class="product-content">
          <h4>UK:RP SRP</h4>
          <p>A UK:RP game set in the fictional town 'Shirebrook'</p>
          <p>Click to read more!</p>
          <a href="/SRP/" class="view-btn">View</a>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-content">
          <h4>Products</h4>
          <p>Realistic and optimized vehicles.</p>
          <a href="/sba-bb/" class="view-btn">View</a>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-content">
          <h4>Contact Us</h4>
          <p>Advanced response systems.</p>
          <a href="/contact-us/" class="view-btn">View</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
